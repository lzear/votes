name: Bundle-size

on:
  pull_request:
    branches:
      - master

jobs:
  size:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - run: corepack enable
      - run: yarn install --immutable
      - run: yarn workspace votes build
      - uses: preactjs/compressed-size-action@v2
        with:
          pattern: '**/dist/**/*.{mjs,js}'
